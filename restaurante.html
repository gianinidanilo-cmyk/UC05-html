<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante Js</title>
</head>
<body>
    <h1>Restaurante JS</h1>
    <form>
        <p>Buffet por Quilo: R$ 
            <!-- Min significa valor minimo e STEP é o passo para aumentar ou diminuir o numero -->
            
            <input type="number" id="inQuilo"min="0" step="0.01" required>
        </p>


        <p>Consumo do cliente (gr):
         <input type="number" id="inConsumo" min="0" required>

         </p>

       <input type="submit" value="Calcular preço">

            




    </form>
    <h3></h3>

            <script src="./js/restaurante.js"></script>

</body>
</html>
