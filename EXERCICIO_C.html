<meta charset=""UTF-8">

<script>

/*
Elaborar um programa que leia o valor de um jantar. Calcule e informe o valor da taxa

   do garçom (10%) e o valor total a ser pago.

        Exemplo de entrada e saída:

	    Valor do jantar: R$ 80.00

	    Taxa do Garcom: R$ 8.00

	    Total a Pagar: R$ 88.00
*/

const valor = Number( prompt ("Valor Jantar"));
const taxa = Number (prompt ("Taxa"));
const valorTaxa = (valor)*(taxa);
const valorTotal = (valor)+(valorTaxa);
alert(`Valor Total a pagar ${valorTotal}`);






</script>
