<meta charset=""UTF-8">
<script>

/*
Elaborar um programa que leia 2 notas de um aluno em uma disciplina. Calcule e informe

   a média das notas.

   Exemplo:

   1º Nota: 7.0

   2º Nota: 8.0

   Média: 7.5
   */ 

  const nota_01 = Number (prompt("Digite Nota 1"));
  const nota_02 = Number (prompt("Digite nota 2"));
  const media = (nota_01 + nota_02)/2;
  alert (` Média do Aluno ${media.toFixed(2)}`);

</script>
