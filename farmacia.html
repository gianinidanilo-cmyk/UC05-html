<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmacia JS</title>
</head>
<body>
    <h1>Farmacia JS</h1>
    <form>   
        <p>Medicamento:
            <input type="text" id="inMedicamento" required>
        </p>

        <p>Valor (R$):
         <input type="number" step ="0.01" id="inValor" min="0" required>
         </p>

         <input type="submit" value ="Mostrar promoção">


    </form>
    <h3 id="outMedicamento"></h3>
    <h3 id="outValor"></h3>
    <script src="./js/farmacia.js"></script>


    
</body>
</html>
