<meta charset=""UTF-8">
<script>

    /*
    Elaborar um programa que leia um número. Calcule e informe os seus vizinhos, 

   ou seja, o número anterior e posterior.

   Exemplo:

   Número: 15

   Vizinhos 14 e 16
   */ 

 const num = Number(prompt("Número"));
 const numVis_1 = (num -1);
 const numVis_2 = (num +1);
 alert(`Os numeros visinhos são ${numVis_1}  e  ${numVis_2}`);

</script>
