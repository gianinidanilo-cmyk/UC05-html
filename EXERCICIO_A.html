<meta charset=""UTF-8">

<script>
/*EElaborar um programa que leia um numero.
Calcule e informe o dobro desse numero.
- Entrada de dados: ler um numero
- Processamento: calcular o dobro
- Saida: Informar o dobro*/

const num = prompt("Numero: "); //Lê um dado de entrada
const dobro = num * 2; // calculo do dobro donumero
//console.log(`O dobro do ${num} é ${dobro}`); // exibe o resultado.
alert(`O dobro do ${num} é ${dobro}`);
</script>
