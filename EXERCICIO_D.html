<meta charset=""UTF-8">

<script>

    /*
    d) Elaborar um programa que leia a duração de uma viagem em dias e horas. Calcule e 

   informe a duração total da viagem em número de horas.

	Exemplo de dados de entrada e saída para viagem que durou 2 dias + 5 horas:

	    Nº Dias: 2

	    Nº Horas: 5

	    Total de Horas: 53 */ 

        const dias = Number (prompt("Nº de Dias")*24);
        const horas = Number (prompt("Nº de horas"));
        const total = (dias) + (horas);
        alert(`Duração total em horas ${total}`);



</script>
